<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>aupa — particle visualizer</title>

    <meta name="description" content="One million GPU-driven particles, cyclical Big Bangs, real-time multi-attractor physics. Built with WebGPU." />
    <meta name="theme-color" content="#000000" />

    <meta property="og:title" content="aupa" />
    <meta property="og:description" content="1M particles. Click to attract, right-click to anchor wells, watch universes form and erupt." />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="aupa" />
    <meta name="twitter:description" content="1M particles. Click to attract, right-click to anchor wells, watch universes form and erupt." />

    <!-- Drop a favorite screenshot at public/og.png (1200×630 ideal) for
         link previews to look good on Twitter, Slack, iMessage, etc. -->
    <meta property="og:image" content="/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:image" content="/og.png" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #000;
        overflow: hidden;
      }
      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        /* Disable browser pinch-zoom and pull-to-refresh so our gestures aren't hijacked. */
        touch-action: none;
      }
      #fallback {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        color: #f88;
        font-family: ui-monospace, SFMono-Regular, monospace;
        font-size: 14px;
        text-align: center;
        padding: 2rem;
      }
      #fallback.show { display: flex; }
      #stats {
        position: fixed;
        top: 8px;
        left: 8px;
        color: #8f8;
        font-family: ui-monospace, SFMono-Regular, monospace;
        font-size: 12px;
        opacity: 0.6;
        pointer-events: none;
      }

      /* ── Config panel ──────────────────────────────────────────── */
      #config {
        position: fixed;
        top: 12px;
        right: 12px;
        width: 220px;
        padding: 14px 14px 12px;
        background: rgba(10, 10, 16, 0.55);
        backdrop-filter: blur(14px) saturate(1.4);
        -webkit-backdrop-filter: blur(14px) saturate(1.4);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 8px;
        font-family: ui-monospace, SFMono-Regular, monospace;
        font-size: 11px;
        color: rgba(255, 255, 255, 0.85);
        z-index: 10;
        user-select: none;
      }
      #config h3 {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin: 0 0 12px;
        font-size: 10px;
        font-weight: 500;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        opacity: 0.55;
        cursor: pointer;
        user-select: none;
      }
      #config h3:hover { opacity: 0.8; }
      .cfg-chevron {
        font-size: 14px;
        line-height: 1;
        opacity: 0.7;
      }
      .cfg-chevron::before { content: '−'; }
      #config.collapsed .cfg-chevron::before { content: '+'; }
      #config.collapsed > *:not(h3) { display: none; }
      #config.collapsed h3 { margin: 0; }

      @media (max-width: 600px) {
        #config {
          top: 8px;
          right: 8px;
          width: 180px;
          padding: 10px 12px 10px;
        }
        #config h3 { font-size: 9px; margin-bottom: 10px; }
        .cfg-row { margin-bottom: 8px; }
        .cfg-label { font-size: 9px; }
        .cfg-button { font-size: 9px; padding: 6px; }
        .cfg-preset { font-size: 8px; padding: 4px 0; }
        .cfg-hint { font-size: 8px; }
      }
      .cfg-row { margin-bottom: 10px; }
      .cfg-label {
        display: flex;
        justify-content: space-between;
        margin-bottom: 4px;
        font-size: 10px;
        letter-spacing: 0.04em;
      }
      .cfg-label > span:first-child { opacity: 0.65; }
      .cfg-label > span:last-child {
        font-variant-numeric: tabular-nums;
        opacity: 0.95;
      }
      #config input[type="range"] {
        width: 100%;
        -webkit-appearance: none;
        appearance: none;
        height: 2px;
        background: rgba(255, 255, 255, 0.12);
        border-radius: 1px;
        margin: 0;
        outline: none;
        cursor: pointer;
      }
      #config input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.9);
        cursor: pointer;
        border: none;
        transition: transform 80ms ease;
      }
      #config input[type="range"]::-webkit-slider-thumb:hover {
        transform: scale(1.2);
      }
      #config input[type="range"]::-moz-range-thumb {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.9);
        cursor: pointer;
        border: none;
      }
      .cfg-button {
        width: 100%;
        margin-top: 6px;
        padding: 7px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 4px;
        color: rgba(255, 255, 255, 0.75);
        font-family: inherit;
        font-size: 10px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        cursor: pointer;
        transition: background 120ms ease, color 120ms ease;
      }
      .cfg-button:hover {
        background: rgba(255, 255, 255, 0.1);
        color: rgba(255, 255, 255, 0.95);
      }
      .cfg-button:active {
        background: rgba(255, 255, 255, 0.18);
      }
      .cfg-button + .cfg-button {
        margin-top: 4px;
      }
      .cfg-hint {
        margin-top: 12px;
        font-size: 9px;
        letter-spacing: 0.05em;
        text-align: center;
        opacity: 0.4;
        line-height: 1.5;
      }
      .cfg-preset-row {
        display: flex;
        gap: 4px;
        margin: 0 0 14px;
      }
      .cfg-preset {
        flex: 1;
        padding: 5px 0;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 3px;
        color: rgba(255, 255, 255, 0.65);
        font-family: inherit;
        font-size: 9px;
        letter-spacing: 0.04em;
        cursor: pointer;
        transition: background 80ms ease, color 80ms ease;
      }
      .cfg-preset:hover {
        background: rgba(255, 255, 255, 0.12);
        color: rgba(255, 255, 255, 0.95);
      }
      .cfg-preset:active {
        background: rgba(255, 255, 255, 0.2);
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div id="stats"></div>
    <div id="fallback"></div>

    <div id="config">
      <h3>
        <span>controls</span>
        <span class="cfg-chevron"></span>
      </h3>

      <div class="cfg-preset-row">
        <button class="cfg-preset" data-preset="dust">dust</button>
        <button class="cfg-preset" data-preset="galaxy">galaxy</button>
        <button class="cfg-preset" data-preset="nova">nova</button>
        <button class="cfg-preset" data-preset="chaos">chaos</button>
        <button class="cfg-preset" data-preset="calm">calm</button>
      </div>

      <div class="cfg-row">
        <div class="cfg-label">
          <span>gravity</span>
          <span id="cfg-gravity-val">2.00</span>
        </div>
        <input type="range" id="cfg-gravity" min="0" max="6" step="0.1" value="2.0" />
      </div>

      <div class="cfg-row">
        <div class="cfg-label">
          <span>drag</span>
          <span id="cfg-drag-val">0.60</span>
        </div>
        <input type="range" id="cfg-drag" min="0" max="2" step="0.05" value="0.6" />
      </div>

      <div class="cfg-row">
        <div class="cfg-label">
          <span>trail length</span>
          <span id="cfg-trail-val">0.93</span>
        </div>
        <input type="range" id="cfg-trail" min="0.5" max="0.99" step="0.01" value="0.93" />
      </div>

      <div class="cfg-row">
        <div class="cfg-label">
          <span>particle size</span>
          <span id="cfg-particlesize-val">0.008</span>
        </div>
        <input type="range" id="cfg-particlesize" min="0.002" max="0.025" step="0.001" value="0.008" />
      </div>

      <div class="cfg-row">
        <div class="cfg-label">
          <span>glow</span>
          <span id="cfg-glow-val">0.35</span>
        </div>
        <input type="range" id="cfg-glow" min="0.05" max="1.0" step="0.01" value="0.35" />
      </div>

      <div class="cfg-row">
        <div class="cfg-label">
          <span>bloom</span>
          <span id="cfg-bloom-val">1.00</span>
        </div>
        <input type="range" id="cfg-bloom" min="0" max="3" step="0.05" value="1.0" />
      </div>

      <div class="cfg-row">
        <div class="cfg-label">
          <span>boom intensity</span>
          <span id="cfg-boompeak-val">80</span>
        </div>
        <input type="range" id="cfg-boompeak" min="20" max="200" step="5" value="80" />
      </div>

      <div class="cfg-row">
        <div class="cfg-label">
          <span>boom interval</span>
          <span id="cfg-boomtrigger-val">6.0</span>
        </div>
        <input type="range" id="cfg-boomtrigger" min="2" max="20" step="0.5" value="6" />
      </div>

      <button id="cfg-restart" class="cfg-button">restart universe</button>
      <button id="cfg-clear-wells" class="cfg-button">clear gravity wells</button>
      <button id="cfg-share" class="cfg-button">share this look</button>
      <button id="cfg-screenshot" class="cfg-button">save screenshot</button>

      <div class="cfg-hint">
        desktop: drag orbit · scroll zoom · right-click well<br />
        touch: 1-finger cursor · 2-finger orbit/pinch · double-tap well<br />
        press <b>h</b> to hide ui
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
